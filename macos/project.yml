name: ImageResize
options:
  bundleIdPrefix: com.appcraft
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  ImageResize:
    type: application
    platform: macOS
    sources:
      - path: ImageResize
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.appcraft.image-resize
      PRODUCT_NAME: Image Resize
      INFOPLIST_KEY_CFBundleDisplayName: Image Resize
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.photography
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      ENABLE_HARDENED_RUNTIME: YES
